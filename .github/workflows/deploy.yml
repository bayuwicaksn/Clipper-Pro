name: Build Clipper-Pro

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (all/frontend/backend/worker_gpu/worker_node)"
        required: false
        default: "all"

env:
  GCP_REGION: asia-southeast1
  REGISTRY: asia-southeast1-docker.pkg.dev
  REPO: clipper

jobs:

  # ── Detect Changes ────────────────────────────────────────────────────
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      worker_gpu: ${{ steps.filter.outputs.worker_gpu }}
      worker_node: ${{ steps.filter.outputs.worker_node }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy.yml'
            backend:
              - 'backend/**'
              - 'shared/**'
              - '.github/workflows/deploy.yml'
            worker_gpu:
              - 'worker_gpu/**'
              - 'shared/**'
              - '.github/workflows/deploy.yml'
            worker_node:
              - 'worker_node/**'
              - 'shared/**'
              - '.github/workflows/deploy.yml'

  ensure-pubsub:
    name: Ensure Pub/Sub Resources
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Create Pub/Sub topics and subscriptions
        run: |
          JOBS_TOPIC="${{ secrets.PUBSUB_TOPIC_JOBS || 'clipper-jobs' }}"
          JOBS_SUB="${{ secrets.PUBSUB_SUBSCRIPTION_JOBS || 'clipper-jobs-sub' }}"
          CAPTION_TOPIC="${{ secrets.PUBSUB_TOPIC_CAPTION || 'clipper-caption-jobs' }}"
          CAPTION_SUB="${{ secrets.PUBSUB_SUBSCRIPTION_CAPTION || 'clipper-caption-jobs-sub' }}"

          gcloud pubsub topics describe "$JOBS_TOPIC" >/dev/null 2>&1 || \
            gcloud pubsub topics create "$JOBS_TOPIC"
          gcloud pubsub topics describe "$CAPTION_TOPIC" >/dev/null 2>&1 || \
            gcloud pubsub topics create "$CAPTION_TOPIC"

          gcloud pubsub subscriptions describe "$JOBS_SUB" >/dev/null 2>&1 || \
            gcloud pubsub subscriptions create "$JOBS_SUB" --topic="$JOBS_TOPIC"
          gcloud pubsub subscriptions describe "$CAPTION_SUB" >/dev/null 2>&1 || \
            gcloud pubsub subscriptions create "$CAPTION_SUB" --topic="$CAPTION_TOPIC"

  # ── Job 1: Build & Push Frontend ─────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [changes, ensure-pubsub]
    if: |
      (github.event_name == 'push' && needs.changes.outputs.frontend == 'true') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.service == 'frontend' || github.event.inputs.service == 'all'))

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID
            }}/${{ env.REPO }}/frontend:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID
            }}/${{ env.REPO }}/frontend:cache,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/frontend:latest
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/frontend:${{ github.sha }}
          build-args: |
            VITE_API_BASE=${{ secrets.BACKEND_URL }}

      - name: Deploy Frontend to Cloud Run
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/frontend

          gcloud run deploy clipper-frontend \
            --image $IMAGE:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --timeout 300 \
            --cpu-boost \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "ENVIRONMENT=production"

  # ── Job 2: Build & Push Backend ──────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [changes, ensure-pubsub]
    if: |
      (github.event_name == 'push' && needs.changes.outputs.backend == 'true') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.service == 'backend' || github.event.inputs.service == 'all'))

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/backend:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/backend:cache,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/backend:latest
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/backend:${{ github.sha }}


      - name: Deploy Backend to Cloud Run
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/backend

          gcloud run deploy clipper-backend \
            --image $IMAGE:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "ENVIRONMENT=production,DATABASE_URL=${{ secrets.DATABASE_URL }},SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_KEY=${{ secrets.SUPABASE_KEY }},GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},PUBSUB_TOPIC_JOBS=${{ secrets.PUBSUB_TOPIC_JOBS || 'clipper-jobs' }}"

  # ── Job 3: Build & Push Worker GPU ───────────────────────────────────
  build-worker-gpu:
    name: Build Worker GPU
    runs-on: ubuntu-latest
    needs: [changes, ensure-pubsub]
    if: |
      (github.event_name == 'push' && needs.changes.outputs.worker_gpu == 'true') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.service == 'worker_gpu' || github.event.inputs.service == 'all'))

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Disk before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "Disk after cleanup:"
          df -h

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Worker GPU
        uses: docker/build-push-action@v5
        with:
          context: worker_gpu
          file: worker_gpu/Dockerfile
          push: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID
            }}/${{ env.REPO }}/worker-gpu:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID
            }}/${{ env.REPO }}/worker-gpu:cache,mode=max
          build-contexts: |
            shared=shared
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/worker-gpu:latest
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/worker-gpu:${{ github.sha }}
          build-args: |
            WHISPER_MODEL=medium


      - name: Deploy Worker GPU to Cloud Run
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/worker-gpu

          gcloud run deploy clipper-worker-gpu \
            --image $IMAGE:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --port 8080 \
            --memory 4Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 1 \
            --timeout 3600 \
            --concurrency 1 \
            --set-env-vars "ENVIRONMENT=production,DATABASE_URL=${{ secrets.DATABASE_URL }},WHISPER_MODEL=medium,GPU_ENABLED=false,GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCS_BUCKET=${{ secrets.GCS_BUCKET }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}"

  # ── Job 4: Build & Push Worker Node ──────────────────────────────────
  build-worker-node:
    name: Build Worker Node
    runs-on: ubuntu-latest
    needs: [changes, ensure-pubsub]
    if: |
      (github.event_name == 'push' && needs.changes.outputs.worker_node == 'true') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.service == 'worker_node' || github.event.inputs.service == 'all'))

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo docker image prune --all --force
          df -h

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Worker Node
        uses: docker/build-push-action@v5
        with:
          context: worker_node
          file: worker_node/Dockerfile
          push: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID
            }}/${{ env.REPO }}/worker-node:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID
            }}/${{ env.REPO }}/worker-node:cache,mode=max
          build-contexts: |
            shared=shared
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/worker-node:latest
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/worker-node:${{ github.sha }}


      - name: Deploy Worker Node to Cloud Run
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO }}/worker-node

          gcloud run deploy clipper-worker-node \
            --image $IMAGE:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --port 8080 \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 1 \
            --timeout 1800 \
            --concurrency 1 \
            --set-env-vars "ENVIRONMENT=production,DATABASE_URL=${{ secrets.DATABASE_URL }},GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCS_BUCKET=${{ secrets.GCS_BUCKET }},GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}"

  # ── Job 5: Configure Push Subscriptions ──────────────────────────────
  configure-push-subs:
    name: Configure Push Subscriptions
    runs-on: ubuntu-latest
    needs: [ build-worker-gpu, build-worker-node ]
    if: |
      needs.build-worker-gpu.result == 'success' ||
      needs.build-worker-node.result == 'success'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Push Subscriptions
        run: |
          JOBS_TOPIC="${{ secrets.PUBSUB_TOPIC_JOBS || 'clipper-jobs' }}"
          JOBS_SUB="${{ secrets.PUBSUB_SUBSCRIPTION_JOBS || 'clipper-jobs-sub' }}"
          CAPTION_TOPIC="${{ secrets.PUBSUB_TOPIC_CAPTION || 'clipper-caption-jobs' }}"
          CAPTION_SUB="${{ secrets.PUBSUB_SUBSCRIPTION_CAPTION || 'clipper-caption-jobs-sub' }}"

          SA_EMAIL="${{ secrets.client_email }}"

          # Ensure SA has invoker permissions for private workers
          if gcloud run services describe clipper-worker-gpu --region ${{ env.GCP_REGION }} >/dev/null 2>&1; then
            gcloud run services add-iam-policy-binding clipper-worker-gpu \
              --region=${{ env.GCP_REGION }} \
              --member="serviceAccount:$SA_EMAIL" \
              --role="roles/run.invoker" \
              --quiet
          fi

          if gcloud run services describe clipper-worker-node --region ${{ env.GCP_REGION }} >/dev/null 2>&1; then
            gcloud run services add-iam-policy-binding clipper-worker-node \
              --region=${{ env.GCP_REGION }} \
              --member="serviceAccount:$SA_EMAIL" \
              --role="roles/run.invoker" \
              --quiet
          fi

          # Ambil URL worker setelah deploy
          GPU_URL=$(gcloud run services describe clipper-worker-gpu \
            --region ${{ env.GCP_REGION }} --format 'value(status.url)' 2>/dev/null || echo "")
          NODE_URL=$(gcloud run services describe clipper-worker-node \
            --region ${{ env.GCP_REGION }} --format 'value(status.url)' 2>/dev/null || echo "")

          echo "GPU Worker URL: $GPU_URL"
          echo "Node Worker URL: $NODE_URL"

          # Update Job Subscription (GPU)
          if [ -n "$GPU_URL" ]; then
            echo "Updating subscription for GPU to PUSH mode..."
            gcloud pubsub subscriptions update "$JOBS_SUB" \
              --push-endpoint="$GPU_URL/pubsub" \
              --push-auth-service-account="$SA_EMAIL" \
              --ack-deadline=600
          fi

          # Update Caption Subscription (Node)
          if [ -n "$NODE_URL" ]; then
            echo "Updating subscription for Node to PUSH mode..."
            gcloud pubsub subscriptions update "$CAPTION_SUB" \
              --push-endpoint="$NODE_URL/pubsub" \
              --push-auth-service-account="$SA_EMAIL" \
              --ack-deadline=300
          fi

  # ── Job 6: Notify ─────────────────────────────────────────────────────
  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [ build-frontend, build-backend, build-worker-gpu, build-worker-node ]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.build-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker GPU | ${{ needs.build-worker-gpu.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker Node | ${{ needs.build-worker-node.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
