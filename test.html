<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Bebas+Neue&family=Montserrat:wght@800;900&family=Oswald:wght@700&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: black; }

    .caption-page {
      pointer-events: none;
      z-index: 50;
      perspective: 1000px;
    }

    .cw {
      font-family: "Bebas Neue", sans-serif;
      font-size: 5.208333333333334vh;
      font-weight: 900;
      font-style: normal;
      text-decoration: none;
      -webkit-text-stroke: 0.41666666666666674vh #000000;
      text-shadow: 0.10416666666666669vh 0.10416666666666669vh 0.10416666666666669vh #000000;
      display: inline-block;
      margin: 0 0.8vh;
      text-transform: uppercase;
      transform-origin: center center;
      will-change: transform, color, opacity;
    }
  </style>
</head>
<body>
<div id="root" data-composition-id="captions"
     data-start="0" data-width="1080" data-height="1920">

  <!-- Background Video -->
  <video id="bg-video" data-start="0" data-duration="1.5"
         data-track-index="0" src="src.mp4" muted playsinline
         style="width:100%; height:100%; object-fit:cover; position:absolute; top:0; left:0;">
  </video>

  <!-- Caption Pages -->
  <div id="page-0" class="clip caption-page"
       data-start="0" data-duration="1" data-track-index="1"
       style="position:absolute; left:50.0%; top:82.0%;
              transform:translate(-50%,-50%); text-align:center; width:85%;
              line-height:1.0; text-wrap:balance;">
    <span id="w-0" class="cw" style="color:#FFFFFF">HELLO</span>
  </div>

  <!-- GSAP Animation Engine -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ paused: true });

  tl.to("#w-0", { color: "#04f827", scale: 1.1, y: -4, duration: 0.15, ease: "back.out(1.7)" }, 0);
  tl.to("#w-0", { color: "#FFFFFF", scale: 1, y: 0, duration: 0.1, ease: "power2.out" }, 1);

    window.__timelines = window.__timelines || {};
    window.__timelines["captions"] = tl;

  </script>
</div>
</body>
</html>
